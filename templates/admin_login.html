<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Login - EyeDetect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
        url("{% static 'images/login-bg.png' %}") center/cover;
}

.login-card {
    width: 380px;
    background: rgba(15,23,42,0.96);
    padding: 32px 28px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    color: #f8fafc;
}

.user-icon {
    width: 64px;
    height: 64px;
    background: rgba(56,189,248,0.18);
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #38bdf8;
    font-size: 26px;
}

.login-card h2 {
    margin-bottom: 8px;
    color: #f8fafc;
}

.login-card p {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 18px;
}

.input-group {
    position: relative;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 14px;
}

.input-group input {
    width: 100%;
    height: 44px;
    padding: 0 38px;
    border: 1px solid rgba(148,163,184,0.4);
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
}

.input-group input::placeholder {
    color: #94a3b8;
}

.input-group input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 2px rgba(56,189,248,0.12);
}

.left-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.right-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #94a3b8;
}

.btn-login {
    width: 100%;
    max-width: 320px;
    height: 44px;
    background: #0ea5e9;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 5px;
    font-weight: 600;
}

.btn-login:hover {
    background: #0284c7;
}

a {
    color: #38bdf8;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.error-text {
    color: #f87171;
    font-size: 13px;
    margin-bottom: 10px;
}
</style>

</head>
<body>

<div class="login-card">

    <div class="user-icon">
        <i class="fa-solid fa-shield-halved"></i>
    </div>

    <h2>Admin Login</h2>
    <p>Masuk menggunakan akun admin atau staff untuk mengakses dashboard EyeDetect.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="error-text">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form action="{% url 'login_proses' %}" method="POST">
        {% csrf_token %}

        <input type="hidden" name="login_as_admin" value="1" />

        <div class="input-group">
            <i class="fa-regular fa-envelope left-icon"></i>
            <input type="email" name="email"
                   placeholder="Email admin"
                   value="{{ request.POST.email|default:'' }}"
                   required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" name="password" id="password"
                   placeholder="Password" required>
            <i class="fa-regular fa-eye right-icon" onclick="togglePassword(this)"></i>
        </div>

        <button class="btn-login">Masuk sebagai Admin</button>
    </form>

    <p style="margin-top:15px; font-size:14px; color:#cbd5e1;">
        Bukan admin? <a href="{% url 'login' %}">Kembali ke login pengguna</a>
    </p>

</div>

<script>
function togglePassword(icon) {
    const password = document.getElementById('password');
    if (password.type === 'password') {
        password.type = 'text';
        icon.classList.replace('fa-eye','fa-eye-slash');
    } else {
        password.type = 'password';
        icon.classList.replace('fa-eye-slash','fa-eye');
    }
}
</script>

</body>
</html>
