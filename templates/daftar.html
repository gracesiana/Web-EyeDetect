<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - EyeDetect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
                url("{% static 'images/login-bg.png' %}");
            background-size: cover;
            background-position: center;
            opacity: 0.55;
            z-index: 1;
        }

        .auth-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            padding: 25px;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 42px 46px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.13);
        }

        .auth-icon {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: #e7f0ff;
            color: #126ee5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            font-size: 35px;
        }

        .auth-card h1 {
            font-size: 32px;
            color: #17202a;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 16px;
            color: #6f7b8a;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            height: 52px;
            border: 1px solid #cfd8e3;
            border-radius: 7px;
            padding: 0 50px;
            font-size: 16px;
            outline: none;
            color: #333;
            background: white;
        }

        .input-group input:focus {
            border-color: #1473e6;
            box-shadow: 0 0 0 3px rgba(20,115,230,0.12);
        }

        .left-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a8491;
            font-size: 18px;
        }

        .right-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a8491;
            font-size: 18px;
            cursor: pointer;
        }

        .auth-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 7px;
            background: #0f70e8;
            color: white;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: #095bc1;
            transform: translateY(-2px);
        }

        .auth-link {
            margin-top: 22px;
            font-size: 16px;
            color: #202833;
        }

        .auth-link a {
            color: #0f70e8;
            text-decoration: none;
            font-weight: 700;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 18px;
            margin: 30px 0 22px;
            color: #737f8c;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: #d4dbe4;
        }

        .google-btn {
            width: 100%;
            height: 52px;
            background: white;
            border: 1px solid #cfd8e3;
            border-radius: 7px;
            font-size: 16px;
            color: #202833;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f4f8ff;
            border-color: #0f70e8;
        }

        .google-btn i {
            font-size: 22px;
            color: #ea4335;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            color: #0f70e8;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        .error-text {
            color: #e53935;
            font-size: 13px;
            text-align: left;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .auth-wrapper {
                padding: 18px;
            }

            .auth-card {
                padding: 34px 24px;
            }

            .auth-card h1 {
                font-size: 26px;
            }

            .desc {
                font-size: 14px;
            }

            .input-group input {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>

            <h1>Daftar Akun</h1>

            <p class="desc">
                Buat akun baru untuk mulai menggunakan<br>
                sistem monitoring kami
            </p>

            <form action="{% url 'register_proses' %}" method="POST">
                {% csrf_token %}

                {% if messages %}
                    {% for message in messages %}
                        <div class="error-text">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <div class="input-group">
                    <i class="fa-regular fa-user left-icon"></i>
                    <input type="text" name="name" placeholder="Nama Lengkap" value="{{ request.POST.name|default:'' }}" required>
                </div>

                <div class="input-group">
                    <i class="fa-regular fa-envelope left-icon"></i>
                    <input type="email" name="email" placeholder="Email" value="{{ request.POST.email|default:'' }}" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock left-icon"></i>
                    <input type="password" name="password" placeholder="Password" id="password" required>
                    <i class="fa-regular fa-eye right-icon" onclick="togglePassword('password', this)"></i>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock left-icon"></i>
                    <input type="password" name="password_confirmation" placeholder="Konfirmasi Password" id="confirmPassword" required>
                    <i class="fa-regular fa-eye right-icon" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <button type="submit" class="auth-btn">Daftar</button>
            </form>

            <div class="auth-link">
                Sudah punya akun? <a href="{% url 'login' %}">Masuk</a>
            </div>

            <div class="divider">
                <span></span>
                atau
                <span></span>
            </div>

            <button type="button" class="google-btn">
                <i class="fa-brands fa-google"></i>
                Daftar dengan Google
            </button>

            <a href="{% url 'home' %}" class="back-home">
                <i class="fa-solid fa-chevron-left"></i>
                Kembali ke Beranda
            </a>

        </div>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>

</body>
</html>
