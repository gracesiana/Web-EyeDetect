<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - EyeDetect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
                url("{% static 'images/login-bg.png' %}");
            background-size: cover;
            background-position: center;
            opacity: 0.55;
            z-index: 1;
        }

        .auth-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            padding: 25px;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 46px 46px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.13);
        }

        .auth-icon {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: #e7f0ff;
            color: #126ee5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            font-size: 35px;
        }

        .auth-card h1 {
            font-size: 32px;
            color: #17202a;
            font-weight: 800;
            margin-bottom: 14px;
        }

        .desc {
            font-size: 16px;
            color: #6f7b8a;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            height: 52px;
            border: 1px solid #cfd8e3;
            border-radius: 7px;
            padding: 0 50px;
            font-size: 16px;
            outline: none;
            color: #333;
            background: white;
        }

        .input-group input:focus {
            border-color: #1473e6;
            box-shadow: 0 0 0 3px rgba(20,115,230,0.12);
        }

        .left-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a8491;
            font-size: 18px;
        }

        .auth-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 7px;
            background: #0f70e8;
            color: white;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: #095bc1;
            transform: translateY(-2px);
        }

        .info-box {
            background: #eef6ff;
            border: 1px solid #9dccff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 28px;
            text-align: left;
            display: flex;
            gap: 14px;
        }

        .info-box i {
            color: #0f70e8;
            font-size: 22px;
            margin-top: 3px;
        }

        .info-box h3 {
            color: #1d2733;
            font-size: 17px;
            margin-bottom: 8px;
        }

        .info-box p {
            color: #566273;
            font-size: 15px;
            line-height: 1.6;
        }

        .back-login {
            display: inline-block;
            margin-top: 30px;
            color: #0f70e8;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }

        .back-login:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .auth-wrapper {
                padding: 18px;
            }

            .auth-card {
                padding: 34px 24px;
            }

            .auth-card h1 {
                font-size: 26px;
            }

            .desc {
                font-size: 14px;
            }

            .input-group input {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-icon">
                <i class="fa-solid fa-lock"></i>
            </div>

            <h1>Lupa Password</h1>

            <p class="desc">
                Masukkan email Anda dan kami akan mengirimkan<br>
                instruksi untuk mereset password.
            </p>

            <form action="#" method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <i class="fa-regular fa-envelope left-icon"></i>
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <button type="submit" class="auth-btn">Kirim Instruksi</button>
            </form>

            <div class="info-box">
                <i class="fa-solid fa-circle-info"></i>

                <div>
                    <h3>Periksa email Anda</h3>
                    <p>
                        Kami akan mengirimkan link reset password ke
                        email yang Anda masukkan.
                    </p>
                </div>
            </div>

            <a href="{% url 'login' %}" class="back-login">
                Kembali ke Login
            </a>

        </div>
    </div>

</body>
</html>
