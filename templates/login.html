<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - EyeDetect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url("{% static 'images/login-bg.png' %}") center/cover;
}

/* CARD */
.login-card {
    width: 360px;
    background: white;
    padding: 28px 24px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* ICON */
.user-icon {
    width: 60px;
    height: 60px;
    background: #e8f1ff;
    border-radius: 50%;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1f6fe5;
    font-size: 24px;
}

/* TEXT */
.login-card h2 {
    margin-bottom: 8px;
}

.login-card p {
    font-size: 14px;
    color: #666;
    margin-bottom: 18px;
}

/* INPUT */
.input-group {
    position: relative;
    max-width: 300px;
    margin: 0 auto 14px;
}

.input-group input {
    width: 100%;
    height: 42px;
    padding: 0 38px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
}

.input-group input:focus {
    border-color: #1f6fe5;
    box-shadow: 0 0 0 2px rgba(31,111,229,0.1);
}

.left-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: gray;
}

.right-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* BUTTON */
.btn-login {
    width: 300px;
    height: 42px;
    background: #1f6fe5;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 5px;
}

.btn-login:hover {
    background: #165dcc;
}

/* LINK */
a {
    color: #1f6fe5;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* ERROR */
.error-text {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}
</style>

</head>
<body>

<div class="login-card">

    <div class="user-icon">
        <i class="fa-solid fa-user"></i>
    </div>

    <h2>Login User</h2>
    <p>Silakan masuk untuk mengakses sistem monitoring kami</p>

    <!-- ERROR -->
    {% if messages %}
        {% for message in messages %}
            <div class="error-text">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <!-- FORM -->
    <form action="{% url 'login_proses' %}" method="POST">
        {% csrf_token %}

        <div class="input-group">
            <i class="fa-regular fa-envelope left-icon"></i>
            <input type="email" name="email"
                   placeholder="Email"
                   value="{{ request.POST.email|default:'' }}"
                   required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" name="password" id="password"
                   placeholder="Password" required>
            <i class="fa-regular fa-eye right-icon" onclick="togglePassword(this)"></i>
        </div>

        <button class="btn-login">Masuk</button>
    </form>

    <p style="margin-top:15px;">
        Belum punya akun?
        <a href="{% url 'register' %}">Daftar</a>
    </p>

    <p>
        <a href="{% url 'lupa_password' %}">Lupa password?</a>
    </p>

</div>

<script>
function togglePassword(icon) {
    const password = document.getElementById('password');
    if (password.type === 'password') {
        password.type = 'text';
        icon.classList.replace('fa-eye','fa-eye-slash');
    } else {
        password.type = 'password';
        icon.classList.replace('fa-eye-slash','fa-eye');
    }
}
</script>

</body>
</html>
