<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login User - EyeDetect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
                url("{% static 'images/login-bg.png' %}");
            background-size: cover;
            background-position: center;
            opacity: 0.45;
            z-index: 1;
        }

        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            padding: 28px 26px 24px;
            text-align: center;
        }

        .user-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #e8f1ff;
            color: #1f6fe5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 34px;
        }

        .login-card h1 {
            font-size: 22px;
            color: #222;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .login-card p {
            color: #7a7a7a;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 22px;
        }

        .input-group {
            position: relative;
            margin-bottom: 14px;
        }

        .input-group input {
            width: 100%;
            height: 46px;
            border: 1px solid #d7d7d7;
            border-radius: 6px;
            padding: 0 42px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        .input-group input:focus {
            border-color: #1f6fe5;
            box-shadow: 0 0 0 2px rgba(31,111,229,0.1);
        }

        .input-group .left-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b8b8b;
            font-size: 15px;
        }

        .input-group .right-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b8b8b;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 6px;
            background: #1f6fe5;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #165dcc;
        }

        .error-text {
            color: #e53935;
            font-size: 13px;
            text-align: left;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        .extra-text {
            margin-top: 16px;
            font-size: 14px;
            color: #444;
        }

        .extra-text a,
        .forgot a {
            color: #1f6fe5;
            text-decoration: none;
            font-weight: 600;
        }

        .extra-text a:hover,
        .forgot a:hover {
            text-decoration: underline;
        }

        .forgot {
            margin-top: 12px;
            font-size: 14px;
        }

        .back-home {
            display: inline-block;
            margin-top: 16px;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }

        .back-home:hover {
            color: #1f6fe5;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px 18px 20px;
            }

            .login-card h1 {
                font-size: 20px;
            }

            .login-card p {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="user-icon">
                <i class="fa-solid fa-user"></i>
            </div>

            <h1>Login User</h1>

            <p>
                Silakan masuk untuk mengakses<br>
                sistem monitoring kami
            </p>

            <form action="{% url 'login.proses' %}" method="POST">
                @csrf

                <div class="input-group">
                    <i class="fa-regular fa-envelope left-icon"></i>
                    <input type="email" name="email" placeholder="Email" value="{{ old('email') }}" required>
                </div>

                @error('email')
                    <div class="error-text">{{ $message }}</div>
                @enderror

                <div class="input-group">
                    <i class="fa-solid fa-lock left-icon"></i>
                    <input type="password" name="password" placeholder="Password" id="password" required>
                    <i class="fa-regular fa-eye right-icon" onclick="togglePassword(this)"></i>
                </div>

                @error('password')
                    <div class="error-text">{{ $message }}</div>
                @enderror

                <button type="submit" class="btn-login">Masuk</button>

            <div class="extra-text">
                Belum punya akun? <a href="{{ url('/daftar') }}">Daftar</a>
            </div>

            <div class="forgot">
                <a href="{{ url('/lupa-password') }}">Lupa password?</a>
            </div>

            <a href="{{ url('/') }}" class="back-home">← Kembali ke Beranda</a>

        </div>
    </div>

    <script>
        function togglePassword(icon) {
            const password = document.getElementById('password');

            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>

</body>
</html>
